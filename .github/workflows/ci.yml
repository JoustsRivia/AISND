name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: 质量门禁（单测 / helper 注释 / 凭据扫描）
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 云函数单元测试（node:test，零依赖）
        run: npm test

      - name: helpers 注释规范校验（PR 级卡点，等价于 pre-commit）
        run: npm run lint:helpers

      - name: 硬编码凭据扫描（防止口令/密钥回潮到源码）
        run: npm run scan:secrets
