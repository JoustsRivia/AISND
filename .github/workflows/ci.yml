name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 云函数单测（node:test，零依赖）
        run: npm test
      - name: helpers 注释规范
        run: npm run lint:helpers
      - name: 隔离层单一源校验（防漂移）
        run: npm run lint:db-base
      - name: 云函数构建产物门禁（可部署性干跑）
        run: npm run validate:functions
      - name: 真实 CLI 部署干跑（§4 #2，注入凭据则真正跑通 tcb fn deploy --dry-run；未配置则优雅跳过）
        continue-on-error: true
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          SECRET_ID: ${{ secrets.SECRET_ID }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: npm run validate:deploy
      - name: 真实 MongoDB 演练（§4 #3 / #6，起 mongodb-memory-server 后跑多域注入回归；未装驱动则优雅跳过）
        continue-on-error: true
        run: |
          npm install --no-save mongodb mongodb-memory-server || true
          (npx --yes mongodb-memory-server > /tmp/mongo.log 2>&1 &) ; sleep 10
          export MONGODB_URI="$(grep -rho 'mongodb://[^ ]*' /tmp/mongo.log 2>/dev/null | head -1 || true)"
          npm run drill:mongo
      - name: 全量 JS 语法检查
        run: npm run check:syntax
