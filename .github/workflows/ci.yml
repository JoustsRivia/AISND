name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 云函数单测（node:test，零依赖）
        run: npm test
      - name: helpers 注释规范
        run: npm run lint:helpers
      - name: 隔离层单一源校验（防漂移）
        run: npm run lint:db-base
      - name: 全量 JS 语法检查
        run: npm run check:syntax
